<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Maraetai</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <main id="login" class="login hidden">
    <form id="login-form" class="card">
      <h1>Maraetai</h1>
      <p class="muted">Sign in with your Navidrome credentials.</p>
      <label>Username<input id="username" autocomplete="username" required /></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" required /></label>
      <button type="submit">Sign in</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </main>

  <!-- App: sidebar + content + full-width player bar (mirrors the macOS split view) -->
  <div id="app" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">Maraetai</div>
      <nav class="snav">
        <button data-route="home" class="snav-item">Home</button>
        <button data-route="library" class="snav-item">Library</button>
        <button data-route="search" class="snav-item">Search</button>
        <button data-route="mymusic" class="snav-item">My Music</button>
      </nav>
      <div class="snav-section">
        <button class="snav-header" data-route="playlists">Playlists</button>
        <div id="sidebar-playlists" class="snav-playlists"></div>
      </div>
      <div class="snav-foot">
        <button data-route="admin" id="nav-admin" class="snav-item hidden">Admin</button>
        <div class="who-row">
          <span id="who" class="muted"></span>
          <button id="logout" class="ghost">Log out</button>
        </div>
      </div>
    </aside>

    <main id="view" class="view"></main>

    <!-- Now playing bar -->
    <footer id="player" class="player hidden">
      <div class="np-meta">
        <img id="np-art" alt="" />
        <div class="np-text">
          <div id="np-title" class="np-title"></div>
          <div id="np-artist" class="np-artist muted"></div>
        </div>
        <button id="np-star" class="icon star" title="Favourite">♡</button>
      </div>
      <div class="np-center">
        <div class="np-controls">
          <button id="np-shuffle" class="icon small" title="Shuffle">🔀</button>
          <button id="np-prev" class="icon" title="Previous">⏮</button>
          <button id="np-play" class="icon play" title="Play / pause">▶</button>
          <button id="np-next" class="icon" title="Next">⏭</button>
          <button id="np-repeat" class="icon small" title="Repeat">🔁</button>
        </div>
        <div class="np-seek">
          <span id="np-cur" class="time">0:00</span>
          <input id="np-progress" type="range" min="0" max="1000" value="0" />
          <span id="np-dur" class="time">0:00</span>
        </div>
      </div>
      <div class="np-right">
        <button id="np-lyrics" class="icon small" title="Lyrics">🎤</button>
        <button id="np-queue" class="icon small" title="Queue">≣</button>
        <span class="icon vol">🔊</span>
        <input id="np-vol" type="range" min="0" max="100" value="100" />
      </div>
    </footer>

    <!-- Queue panel (anchored above the player bar) -->
    <div id="queue-panel" class="queue-panel hidden">
      <div class="qp-head"><span>Queue</span><button id="qp-clear" class="ghost">Clear</button></div>
      <div id="qp-list" class="qp-list"></div>
    </div>

    <!-- Lyrics overlay -->
    <div id="lyrics-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <span id="ly-title" class="np-title"></span>
          <button id="ly-close" class="ghost">Close</button>
        </div>
        <div id="ly-body" class="lyrics"></div>
      </div>
    </div>

    <audio id="audio"></audio>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
