<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Maraetai</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login -->
  <main id="login" class="login hidden">
    <form id="login-form" class="card">
      <h1>Maraetai</h1>
      <p class="muted">Sign in with your Navidrome credentials.</p>
      <label>Username<input id="username" autocomplete="username" required /></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" required /></label>
      <button type="submit">Sign in</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </main>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <span class="brand">Maraetai</span>
      <nav class="tabs">
        <button data-route="home" class="active">Home</button>
        <button data-route="library">Library</button>
        <button data-route="search">Search</button>
        <button data-route="admin" id="nav-admin" class="hidden">Admin</button>
      </nav>
      <span class="spacer"></span>
      <span id="who" class="muted"></span>
      <button id="logout" class="ghost">Log out</button>
    </header>

    <main id="view" class="view"></main>

    <!-- Now playing bar -->
    <footer id="player" class="player hidden">
      <div class="np-meta">
        <img id="np-art" alt="" />
        <div class="np-text">
          <div id="np-title" class="np-title"></div>
          <div id="np-artist" class="np-artist muted"></div>
        </div>
        <button id="np-star" class="icon star" title="Favourite">♡</button>
      </div>
      <div class="np-center">
        <div class="np-controls">
          <button id="np-prev" class="icon" title="Previous">⏮</button>
          <button id="np-play" class="icon play" title="Play / pause">▶</button>
          <button id="np-next" class="icon" title="Next">⏭</button>
        </div>
        <div class="np-seek">
          <span id="np-cur" class="time">0:00</span>
          <input id="np-progress" type="range" min="0" max="1000" value="0" />
          <span id="np-dur" class="time">0:00</span>
        </div>
      </div>
      <div class="np-right">
        <span class="icon vol">🔊</span>
        <input id="np-vol" type="range" min="0" max="100" value="100" />
      </div>
    </footer>

    <audio id="audio"></audio>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
